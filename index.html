<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影像色调大师 - 专业仿色与LUT导出工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #0f1115; color: #e2e8f0; }
        
        /* 自定义控制面板滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1d23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        
        .slider-thumb::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #3b82f6;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid #0f1115;
        }
        
        .canvas-container { position: relative; overflow: hidden; border-radius: 12px; background: #1a1d23; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; transition: opacity 0.2s; }
        
        .loading-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; z-index: 50;
            backdrop-filter: blur(8px);
        }

        .btn-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-[1600px] mx-auto p-4 lg:p-8 flex flex-col lg:flex-row gap-8">
        
        <!-- 左侧：主要工作区 -->
        <div class="flex-1 space-y-6">
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-gray-800 pb-4 gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="palette" class="text-blue-500"></i> 影像色调大师
                    </h1>
                    <p class="text-gray-400 text-sm">Color Mimicry Master - 专业级仿色与精修工具</p>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button id="compareBtn" class="px-3 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition flex items-center gap-2 select-none btn-shadow">
                        <i data-lucide="eye" size="16"></i> 对比
                    </button>
                    <button id="downloadImgBtn" class="px-3 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-bold transition flex items-center gap-2 btn-shadow">
                        <i data-lucide="image" size="16"></i> 保存图片
                    </button>
                    <button id="exportLutBtn" class="px-3 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-bold transition flex items-center gap-2 btn-shadow">
                        <i data-lucide="download" size="16"></i> 导出 LUT
                    </button>
                </div>
            </header>

            <!-- 图像展示区域 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 h-full">
                <!-- 目标照片区 -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-xs font-bold uppercase tracking-wider text-gray-500">我的照片 (处理预览)</span>
                        <label class="cursor-pointer text-blue-400 hover:text-blue-300 text-xs font-medium flex items-center gap-1">
                            <i data-lucide="upload" size="14"></i> 选择照片
                            <input type="file" id="targetInput" accept="image/*" class="hidden">
                        </label>
                    </div>
                    <div class="canvas-container group aspect-video flex items-center justify-center border border-gray-800">
                        <canvas id="mainCanvas"></canvas>
                        <div id="targetPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center cursor-pointer hover:bg-gray-800/50 transition">
                            <i data-lucide="image-plus" size="48" class="text-gray-600 mb-3"></i>
                            <span class="text-gray-500 font-medium">点击上传你的目标照片</span>
                        </div>
                    </div>
                </div>

                <!-- 参考照片区 -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-xs font-bold uppercase tracking-wider text-gray-500">大作参考 (色调来源)</span>
                        <label class="cursor-pointer text-blue-400 hover:text-blue-300 text-xs font-medium flex items-center gap-1">
                            <i data-lucide="upload" size="14"></i> 选择参考
                            <input type="file" id="refInput" accept="image/*" class="hidden">
                        </label>
                    </div>
                    <div class="canvas-container aspect-video flex items-center justify-center border border-gray-800">
                        <canvas id="refCanvas"></canvas>
                        <div id="refPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center cursor-pointer hover:bg-gray-800/50 transition">
                            <i data-lucide="swatch-book" size="48" class="text-gray-600 mb-3"></i>
                            <span class="text-gray-500 font-medium">点击上传参考摄影作品</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：精修控制面板 -->
        <div class="w-full lg:w-96 bg-[#1a1d23] border border-gray-800 rounded-2xl p-6 overflow-y-auto max-h-[90vh] custom-scrollbar shadow-2xl">
            <div class="space-y-8">
                <!-- 仿色核心控制 -->
                <section>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400 flex items-center gap-2">
                            <i data-lucide="wand-2" size="16"></i> 色彩迁移强度
                        </h3>
                        <span id="transferStrengthVal" class="text-blue-500 text-sm font-mono font-bold">0%</span>
                    </div>
                    <div class="px-1">
                        <input type="range" id="transferStrength" min="0" max="100" value="0" class="w-full h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                    </div>
                </section>

                <!-- 基础光影 -->
                <section>
                    <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-6 border-b border-gray-800 pb-2">基础光影</h3>
                    <div class="space-y-6">
                        <div class="space-y-3">
                            <div class="flex justify-between text-xs text-gray-400 font-medium"><span>曝光度</span><span id="exposureVal" class="font-mono">0</span></div>
                            <input type="range" id="exposure" min="-100" max="100" value="0" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between text-xs text-gray-400 font-medium"><span>对比度</span><span id="contrastVal" class="font-mono">0</span></div>
                            <input type="range" id="contrast" min="-100" max="100" value="0" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                        </div>
                    </div>
                </section>

                <!-- 颜色与白平衡 -->
                <section>
                    <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-6 border-b border-gray-800 pb-2">色彩平衡</h3>
                    <div class="space-y-6">
                        <div class="space-y-3">
                            <div class="flex justify-between text-xs text-gray-400 font-medium"><span>色温 (蓝/黄)</span><span id="tempVal" class="font-mono">0</span></div>
                            <input type="range" id="temp" min="-100" max="100" value="0" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between text-xs text-gray-400 font-medium"><span>色调 (绿/洋红)</span><span id="tintVal" class="font-mono">0</span></div>
                            <input type="range" id="tint" min="-100" max="100" value="0" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between text-xs text-gray-400 font-medium"><span>饱和度</span><span id="saturationVal" class="font-mono">0</span></div>
                            <input type="range" id="saturation" min="-100" max="100" value="0" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                        </div>
                    </div>
                </section>

                <!-- 质感细节 -->
                <section>
                    <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-6 border-b border-gray-800 pb-2">质感增强</h3>
                    <div class="space-y-6">
                        <div class="space-y-3">
                            <div class="flex justify-between text-xs text-gray-400 font-medium"><span>胶片颗粒强度</span><span id="grainVal" class="font-mono">0</span></div>
                            <input type="range" id="grain" min="0" max="100" value="0" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                        </div>
                    </div>
                </section>

                <!-- 功能按钮 -->
                <div class="pt-4 space-y-3">
                    <button id="resetBtn" class="w-full py-3 border border-gray-700 rounded-xl text-sm font-medium text-gray-400 hover:bg-gray-800 hover:text-white transition flex items-center justify-center gap-2">
                        <i data-lucide="rotate-ccw" size="16"></i> 重置所有参数
                    </button>
                    <p class="text-[10px] text-gray-600 text-center uppercase tracking-tighter">Processed locally in your browser</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载指示器 -->
    <div id="loading" class="loading-overlay hidden">
        <div class="text-center">
            <div class="w-14 h-14 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4 mx-auto"></div>
            <p class="text-white font-bold tracking-widest text-sm">正在计算色彩矩阵...</p>
        </div>
    </div>

    <script>
        // 初始化图标
        lucide.createIcons();

        // 应用状态
        const state = {
            targetImg: null,
            refImg: null,
            targetData: null,
            refStats: null,
            targetStats: null,
            isComparing: false
        };

        const elements = {
            targetInput: document.getElementById('targetInput'),
            refInput: document.getElementById('refInput'),
            mainCanvas: document.getElementById('mainCanvas'),
            refCanvas: document.getElementById('refCanvas'),
            targetPlaceholder: document.getElementById('targetPlaceholder'),
            refPlaceholder: document.getElementById('refPlaceholder'),
            compareBtn: document.getElementById('compareBtn'),
            downloadImgBtn: document.getElementById('downloadImgBtn'),
            exportLutBtn: document.getElementById('exportLutBtn'),
            resetBtn: document.getElementById('resetBtn'),
            loading: document.getElementById('loading'),
            // 滑块
            transferStrength: document.getElementById('transferStrength'),
            exposure: document.getElementById('exposure'),
            contrast: document.getElementById('contrast'),
            temp: document.getElementById('temp'),
            tint: document.getElementById('tint'),
            saturation: document.getElementById('saturation'),
            grain: document.getElementById('grain')
        };

        // UI 事件监听
        elements.targetPlaceholder.onclick = () => elements.targetInput.click();
        elements.refPlaceholder.onclick = () => elements.refInput.click();
        elements.targetInput.onchange = (e) => handleImageUpload(e, 'target');
        elements.refInput.onchange = (e) => handleImageUpload(e, 'ref');

        // 滑块交互逻辑
        const sliderIds = ['transferStrength', 'exposure', 'contrast', 'temp', 'tint', 'saturation', 'grain'];
        sliderIds.forEach(id => {
            const el = elements[id];
            el.oninput = () => {
                const label = document.getElementById(id + 'Val');
                if (label) {
                    label.textContent = (id === 'transferStrength' ? el.value + '%' : el.value);
                }
                applyChanges();
            };
        });

        // 对比功能
        const startCompare = () => toggleCompare(true);
        const endCompare = () => toggleCompare(false);
        elements.compareBtn.onmousedown = startCompare;
        elements.compareBtn.onmouseup = endCompare;
        elements.compareBtn.ontouchstart = startCompare;
        elements.compareBtn.ontouchend = endCompare;

        elements.resetBtn.onclick = resetSettings;
        elements.exportLutBtn.onclick = exportCubeLut;
        
        // 保存图片功能
        elements.downloadImgBtn.onclick = () => {
            if (!state.targetImg) {
                alert("请先上传照片并进行处理。");
                return;
            }
            const link = document.createElement('a');
            link.download = `ColorMimic_Result_${Date.now()}.png`;
            link.href = elements.mainCanvas.toDataURL('image/png', 1.0);
            link.click();
        };

        // 图像处理
        function handleImageUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    if (type === 'target') {
                        state.targetImg = img;
                        elements.targetPlaceholder.classList.add('hidden');
                        renderToCanvas(img, elements.mainCanvas);
                        state.targetData = elements.mainCanvas.getContext('2d').getImageData(0, 0, elements.mainCanvas.width, elements.mainCanvas.height);
                        state.targetStats = getStats(state.targetData);
                    } else {
                        state.refImg = img;
                        elements.refPlaceholder.classList.add('hidden');
                        renderToCanvas(img, elements.refCanvas);
                        const refData = elements.refCanvas.getContext('2d').getImageData(0, 0, elements.refCanvas.width, elements.refCanvas.height);
                        state.refStats = getStats(refData);
                    }
                    applyChanges();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function renderToCanvas(img, canvas) {
            const ctx = canvas.getContext('2d');
            const maxDim = 1200; // 性能优化：限制尺寸
            let w = img.width;
            let h = img.height;
            if (w > maxDim || h > maxDim) {
                const ratio = Math.min(maxDim / w, maxDim / h);
                w *= ratio;
                h *= ratio;
            }
            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);
        }

        // --- 色彩算法 ---

        function getStats(imageData) {
            const data = imageData.data;
            const n = data.length / 4;
            let sumL = 0, sumA = 0, sumB = 0;
            
            for (let i = 0; i < data.length; i += 4) {
                const lab = rgbToLab(data[i], data[i+1], data[i+2]);
                sumL += lab[0]; sumA += lab[1]; sumB += lab[2];
            }
            
            const meanL = sumL / n;
            const meanA = sumA / n;
            const meanB = sumB / n;

            let varL = 0, varA = 0, varB = 0;
            for (let i = 0; i < data.length; i += 4) {
                const lab = rgbToLab(data[i], data[i+1], data[i+2]);
                varL += Math.pow(lab[0] - meanL, 2);
                varA += Math.pow(lab[1] - meanA, 2);
                varB += Math.pow(lab[2] - meanB, 2);
            }

            return {
                mean: [meanL, meanA, meanB],
                std: [Math.sqrt(varL / n) || 1, Math.sqrt(varA / n) || 1, Math.sqrt(varB / n) || 1]
            };
        }

        function rgbToLab(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
            g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
            b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;

            let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) / 0.95047;
            let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) / 1.00000;
            let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) / 1.08883;

            x = x > 0.008856 ? Math.pow(x, 1/3) : (7.787 * x) + 16/116;
            y = y > 0.008856 ? Math.pow(y, 1/3) : (7.787 * y) + 16/116;
            z = z > 0.008856 ? Math.pow(z, 1/3) : (7.787 * z) + 16/116;

            return [(116 * y) - 16, 500 * (x - y), 200 * (y - z)];
        }

        function labToRgb(l, a, b) {
            let y = (l + 16) / 116;
            let x = a / 500 + y;
            let z = y - b / 200;

            x = Math.pow(x, 3) > 0.008856 ? Math.pow(x, 3) : (x - 16/116) / 7.787;
            y = Math.pow(y, 3) > 0.008856 ? Math.pow(y, 3) : (y - 16/116) / 7.787;
            z = Math.pow(z, 3) > 0.008856 ? Math.pow(z, 3) : (z - 16/116) / 7.787;

            x *= 0.95047; y *= 1.00000; z *= 1.08883;

            let r = x * 3.2406 + y * -1.5372 + z * -0.4986;
            let g = x * -0.9689 + y * 1.8758 + z * 0.0415;
            let b_ = x * 0.0557 + y * -0.2040 + z * 1.0570;

            r = r > 0.0031308 ? 1.055 * Math.pow(r, 1/2.4) - 0.055 : 12.92 * r;
            g = g > 0.0031308 ? 1.055 * Math.pow(g, 1/2.4) - 0.055 : 12.92 * g;
            b_ = b_ > 0.0031308 ? 1.055 * Math.pow(b_, 1/2.4) - 0.055 : 12.92 * b_;

            return [
                Math.max(0, Math.min(255, r * 255)),
                Math.max(0, Math.min(255, g * 255)),
                Math.max(0, Math.min(255, b_ * 255))
            ];
        }

        function applyChanges() {
            if (!state.targetData) return;
            
            const strength = parseInt(elements.transferStrength.value) / 100;
            const exp = parseInt(elements.exposure.value) / 100;
            const con = (parseInt(elements.contrast.value) + 100) / 100;
            const sat = (parseInt(elements.saturation.value) + 100) / 100;
            const tempVal = parseInt(elements.temp.value) / 200;
            const tintVal = parseInt(elements.tint.value) / 200;
            const grainStr = parseInt(elements.grain.value) / 100;

            const outCanvas = elements.mainCanvas;
            const ctx = outCanvas.getContext('2d');
            const outData = ctx.createImageData(state.targetData.width, state.targetData.height);
            const src = state.targetData.data;
            const dst = outData.data;

            const doTransfer = state.refStats && strength > 0;

            for (let i = 0; i < src.length; i += 4) {
                let r = src[i], g = src[i+1], b = src[i+2];

                if (doTransfer) {
                    let lab = rgbToLab(r, g, b);
                    for (let j = 0; j < 3; j++) {
                        let mappedVal = (lab[j] - state.targetStats.mean[j]) * (state.refStats.std[j] / state.targetStats.std[j]) + state.refStats.mean[j];
                        lab[j] = lab[j] * (1 - strength) + mappedVal * strength;
                    }
                    [r, g, b] = labToRgb(lab[0], lab[1], lab[2]);
                }

                // 光影
                r = r * Math.pow(2, exp); g = g * Math.pow(2, exp); b = b * Math.pow(2, exp);
                r = ((r / 255 - 0.5) * con + 0.5) * 255;
                g = ((g / 255 - 0.5) * con + 0.5) * 255;
                b = ((b / 255 - 0.5) * con + 0.5) * 255;

                // 色温
                r = r * (1 + tempVal); b = b * (1 - tempVal); g = g * (1 + tintVal);

                // 饱和度
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                r = gray + (r - gray) * sat; g = gray + (g - gray) * sat; b = gray + (b - gray) * sat;

                // 颗粒
                if (grainStr > 0) {
                    const noise = (Math.random() - 0.5) * grainStr * 45;
                    r += noise; g += noise; b += noise;
                }

                dst[i] = r; dst[i+1] = g; dst[i+2] = b; dst[i+3] = 255;
            }
            ctx.putImageData(outData, 0, 0);
        }

        function toggleCompare(active) {
            if (!state.targetImg) return;
            const ctx = elements.mainCanvas.getContext('2d');
            if (active) {
                ctx.drawImage(state.targetImg, 0, 0, elements.mainCanvas.width, elements.mainCanvas.height);
            } else {
                applyChanges();
            }
        }

        function resetSettings() {
            sliderIds.forEach(id => {
                elements[id].value = 0;
                const label = document.getElementById(id + 'Val');
                if (label) label.textContent = (id === 'transferStrength' ? '0%' : '0');
            });
            applyChanges();
        }

        function exportCubeLut() {
            if (!state.targetData) return alert("请先上传照片。");
            elements.loading.classList.remove('hidden');
            
            setTimeout(() => {
                const size = 32;
                let cube = `# Color Mimicry Master Export\nTITLE "Mimic_LUT"\nLUT_3D_SIZE ${size}\n\n`;

                const strength = parseInt(elements.transferStrength.value) / 100;
                const exp = parseInt(elements.exposure.value) / 100;
                const con = (parseInt(elements.contrast.value) + 100) / 100;
                const sat = (parseInt(elements.saturation.value) + 100) / 100;
                const tempVal = parseInt(elements.temp.value) / 200;
                const tintVal = parseInt(elements.tint.value) / 200;
                const doTransfer = state.refStats && strength > 0;

                for (let b_idx = 0; b_idx < size; b_idx++) {
                    for (let g_idx = 0; g_idx < size; g_idx++) {
                        for (let r_idx = 0; r_idx < size; r_idx++) {
                            let r = (r_idx / (size - 1)) * 255;
                            let g = (g_idx / (size - 1)) * 255;
                            let b = (b_idx / (size - 1)) * 255;

                            if (doTransfer) {
                                let lab = rgbToLab(r, g, b);
                                for (let j = 0; j < 3; j++) {
                                    let v = (lab[j] - state.targetStats.mean[j]) * (state.refStats.std[j] / state.targetStats.std[j]) + state.refStats.mean[j];
                                    lab[j] = lab[j] * (1 - strength) + v * strength;
                                }
                                [r, g, b] = labToRgb(lab[0], lab[1], lab[2]);
                            }

                            r = r * Math.pow(2, exp); g = g * Math.pow(2, exp); b = b * Math.pow(2, exp);
                            r = ((r / 255 - 0.5) * con + 0.5) * 255;
                            g = ((g / 255 - 0.5) * con + 0.5) * 255;
                            b = ((b / 255 - 0.5) * con + 0.5) * 255;
                            r = r * (1 + tempVal); b = b * (1 - tempVal); g = g * (1 + tintVal);
                            const gr = 0.299 * r + 0.587 * g + 0.114 * b;
                            r = gr + (r - gr) * sat; g = gr + (g - gr) * sat; b = gr + (gr - gr) * sat;

                            const fr = (Math.max(0, Math.min(255, r)) / 255).toFixed(6);
                            const fg = (Math.max(0, Math.min(255, g)) / 255).toFixed(6);
                            const fb = (Math.max(0, Math.min(255, b)) / 255).toFixed(6);
                            cube += `${fr} ${fg} ${fb}\n`;
                        }
                    }
                }

                const blob = new Blob([cube], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Mimic_Lut_${Date.now()}.cube`;
                a.click();
                elements.loading.classList.add('hidden');
            }, 100);
        }
    </script>
</body>
</html>
